<svg width="1280" height="320" viewBox="0 0 1280 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1280" height="320" fill="#f8f9fc"/>

  <!-- Subtle grid -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e8ecf4" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1280" height="320" fill="url(#grid)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="320" fill="#0099cc"/>

  <!-- Decorative circle top right -->
  <circle cx="1180" cy="60" r="120" fill="#e8f7fc" opacity="0.6"/>
  <circle cx="1180" cy="60" r="80" fill="#d0f0f8" opacity="0.5"/>

  <!-- Decorative circle bottom left -->
  <circle cx="100" cy="280" r="80" fill="#e8f7fc" opacity="0.4"/>

  <!-- Tag -->
  <rect x="100" y="90" width="210" height="28" rx="14" fill="#e8f7fc" stroke="#b3e0f0" stroke-width="1"/>
  <text x="205" y="109" font-family="monospace" font-size="11" font-weight="600" fill="#0099cc" text-anchor="middle" letter-spacing="2">LEI Nº 13.709/2018</text>

  <!-- Main title -->
  <text x="100" y="175" font-family="Georgia, serif" font-size="52" font-weight="700" fill="#0f1e35" letter-spacing="-1">Checklist de Conformidade</text>
  <text x="100" y="235" font-family="Georgia, serif" font-size="52" font-weight="700" fill="#0099cc" letter-spacing="-1">LGPD</text>

  <!-- Bottom line -->
  <rect x="100" y="268" width="60" height="3" rx="2" fill="#0099cc"/>
  <rect x="168" y="268" width="20" height="3" rx="2" fill="#b3e0f0"/>
</svg>
